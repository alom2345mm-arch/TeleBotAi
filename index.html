<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Interactive Console</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0c0d0e;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .console-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background-color: #000000;
            border: 2px solid #00ff66;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .console-header {
            background-color: #1a1c20;
            padding: 12px 15px;
            border-bottom: 1px solid #2d3139;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
        }
        .header-title {
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .header-user {
            color: #888e9b;
        }
        .console-output {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .console-input-area {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #1a1c20;
            background-color: #000000;
        }
        .prompt {
            color: #38bdf8;
            font-weight: bold;
            margin-right: 8px;
            white-space: nowrap;
        }
        .cmd-input {
            flex: 1;
            background: none;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            outline: none;
            width: 100%;
        }
        .cmd-input::placeholder {
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="console-container">
    <div class="console-header">
        <div class="header-title">⚡ ANTIGRAVITY INTERACTIVE CONSOLE</div>
        <div class="header-user">root@termux-ai</div>
    </div>
    <div class="console-output" id="output">Welcome to Antigravity Hybrid Web-Terminal Engine v2.0...
Sistem siap menerima perintah Linux Termux.</div>
    <div class="console-input-area">
        <span class="prompt">root@termux-ai:~#</span>
        <input type="text" class="cmd-input" id="commandInput" placeholder="Ketik perintah di sini" autofocus autocomplete="off">
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('commandInput');

    inputField.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter') {
            const command = inputField.value.trim();
            if (!command) return;

            // Cetak command ke layar terminal internal web
            outputDiv.innerHTML += `\n\n<span style="color: #38bdf8;">root@termux-ai:~# ${command}</span>`;
            inputField.value = '';
            outputDiv.scrollTop = outputDiv.scrollHeight;

            if (command === 'clear') {
                outputDiv.innerHTML = 'Welcome to Antigravity Hybrid Web-Terminal Engine v2.0...\nSistem siap menerima perintah Linux Termux.';
                return;
            }

            try {
                // Eksekusi request ke HTTP REST Server Localhost Termux (Port 8080)
                const response = await fetch(`http://127.0.0.1:8080/execute?cmd=${encodeURIComponent(command)}`);
                const resultText = await response.text();
                outputDiv.innerHTML += `\n${resultText}`;
            } catch (err) {
                outputDiv.innerHTML += `\n<span style="color: #ef4444;">\n[ERROR] Hubungan terputus atau server lokal bot.py belum dinyalakan!\n💡 Catatan: Jika dibuka lewat HTTPS GitHub Pages, pastikan browser Anda sudah mengizinkan koneksi 'Insecure Content' (HTTP Localhost).</span>`;
            }
            
            // Otomatis menggulung layar ke bawah
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
    });
</script>

</body>
</html>
