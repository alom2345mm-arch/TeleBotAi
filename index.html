<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY INDONESIA - WEB TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; background-color: #0c0f12; color: #00ff66; font-family: 'Fira Code', monospace; }
        .terminal-box { max-width: 900px; margin: 20px auto; background: #050709; border: 2px solid #00ff66; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); overflow: hidden; }
        .terminal-header { background: #1a1f26; padding: 10px 15px; color: #ffffff; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .terminal-body { padding: 15px; height: 400px; overflow-y: auto; font-size: 0.95rem; line-height: 1.4; }
        .input-line { display: flex; padding: 10px 15px; background: #090d10; border-top: 1px solid #1a1f26; }
        .prompt { color: #38bdf8; font-weight: bold; margin-right: 10px; shrink: 0; }
        .cmd-input { background: transparent; border: none; color: #ffffff; font-family: 'Fira Code', monospace; font-size: 0.95rem; width: 100%; outline: none; }
        .error-msg { color: #ef4444; }
    </style>
</head>
<body>

<div class="terminal-box">
    <div class="terminal-header">
        <span>⚡ ANTIGRAVITY INTERACTIVE CONSOLE</span>
        <span style="color: #64748b;">root@termux-ai</span>
    </div>
    <div id="terminalBody" class="terminal-body">
        <div>Welcome to Antigravity Hybrid Web-Terminal Engine v2.0...</div>
        <div>Sistem siap menerima perintah Linux Termux.</div>
        <br>
    </div>
    <div class="input-line">
        <span class="prompt">root@termux-ai:~#</span>
        <input type="text" id="cmdInput" class="cmd-input" placeholder="Ketik perintah di sini (contoh: ls, pwd, python bot.py)..." autofocus autocomplete="off">
    </div>
</div>

<script>
    const cmdInput = document.getElementById('cmdInput');
    const terminalBody = document.getElementById('terminalBody');

    cmdInput.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter') {
            const command = this.value.trim();
            if (!command) return;

            // Tampilkan perintah yang diketik ke layar terminal
            terminalBody.innerHTML += `<div><span style="color: #38bdf8; font-weight:bold;">root@termux-ai:~#</span> ${command}</div>`;
            this.value = '';
            terminalBody.scrollTop = terminalBody.scrollHeight;

            try {
                // Tembak ke server jembatan lokal app.py
                const response = await fetch('http://localhost:7860/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: command })
                });
                const data = await response.json();
                
                // Tampilkan respon output dari Termux asli
                terminalBody.innerHTML += `<div style="color: #e2e8f0; white-space: pre-wrap;">${data.output}</div><br>`;
            } catch (err) {
                terminalBody.innerHTML += `<div class="error-msg">[ERROR] Hubungan terputus atau server lokal app.py belum dinyalakan!</div><br>`;
            }
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }
    });
</script>

</body>
</html>
